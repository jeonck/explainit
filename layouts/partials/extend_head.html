<script type="module">
  import mermaid from "https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs";

  function currentTheme() {
    var t = document.documentElement.dataset.theme;
    if (t === "dark" || t === "light") return t === "dark" ? "dark" : "default";
    return window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "default";
  }

  function renderDiagrams() {
    mermaid.initialize({ startOnLoad: false, theme: currentTheme(), securityLevel: "strict" });
    document.querySelectorAll("pre.mermaid").forEach(function (el) {
      if (!el.dataset.source) el.dataset.source = el.textContent;
      el.removeAttribute("data-processed");
      el.innerHTML = el.dataset.source;
    });
    mermaid.run({ querySelector: "pre.mermaid" });
  }

  document.addEventListener("DOMContentLoaded", function () {
    renderDiagrams();
    var toggle = document.getElementById("theme-toggle");
    if (toggle) toggle.addEventListener("click", function () { setTimeout(renderDiagrams, 0); });
  });
</script>
