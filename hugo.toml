baseURL = 'https://explainit.metacog.co.kr/'
locale = 'en-us'
title = 'Explain It'
theme = 'PaperMod'
paginate = 10

[params]
  env = 'production'
  title = 'Explain It'
  description = "Big IT and tech words, explained like you're 12 — one clear analogy and one diagram per post, no unexplained jargon"
  author = 'jeonck'
  defaultTheme = 'auto'
  disableThemeToggle = false
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = true
  ShowRssButtonInSectionTermList = true
  UseHugoToc = true
  disableSpecial1stPost = false
  disableScrollToTop = false
  comments = false
  hidemeta = false
  hideSummary = false
  showtoc = false
  tocopen = false

  [params.homeInfoParams]
    Title = 'Explain It 🧠'
    Content = "Type any IT or tech term or phrase and get it explained like you're 12: one everyday analogy, a step-by-step breakdown, a simple diagram, and a quick quiz to check yourself."

  [[params.socialIcons]]
    name = 'github'
    url = 'https://github.com/jeonck/explainit'

[menu]
  [[menu.main]]
    identifier = 'input'
    name = 'Explain a Term ✏️'
    url = 'https://github.com/jeonck/explainit/edit/main/input/term.md'
    weight = 5
  [[menu.main]]
    identifier = 'posts'
    name = 'Posts'
    url = '/posts/'
    weight = 10
  [[menu.main]]
    identifier = 'tags'
    name = 'Tags'
    url = '/tags/'
    weight = 20
  [[menu.main]]
    identifier = 'search'
    name = 'Search'
    url = '/search/'
    weight = 30

[outputs]
  home = ['HTML', 'RSS', 'JSON']

# Quiz sections use raw HTML <details>/<summary> accordions in generated posts
[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
